nameOverride: ""
fullnameOverride: ""

# extraImagePullSecrets:
#   - name: extra-pull-secret

positionSource:
  image:
    repository: starwitorg/sae-position-source
    tag: 1.2.0
  enabled: false
  settingsYaml:
    log_level: INFO
    position_source:                          # static source outputs the same coordinates twice a second
      type: static
      lat: 52
      lon: 10
    # position_source:                        # command source tries to read NMEA sentences from stdout of given command (this is recommended)
    #   type: command
    #   command: ["gpspipe", "-r"]            # this is passed to Popen; if you want to use a bash pipeline do ["bash", "-c", "command | command2"]
    # position_source:                        # dynamic source tries to read NMEA sentences from given serial device (i.e. USB gps receiver)
    #   type: dynamic
    #   serial_device: /dev/ttyACM0
  gpsdSidecar:
    enabled: false                            # only enable if non-static config above
    image:
      repository: starwitorg/sae-gpsd
      tag: 2025-09-10
    hostGpsDevice: /path/to/gpsdevice         # the path to a character device gpsd can use (e.g. /dev/ttyACM0) (is passed to hostPath volume mount)
    entrypointSh: |
      sleep 3600

videoSource:
  image: 
    repository: starwitorg/sae-video-source-py
    tag: 2.3.3
  settingsYamls:
  - id: stream1
    uri: 'uri'
    log_level: INFO

objectDetector:
  image:
    repository: starwitorg/sae-object-detector
    tag: 4.2.1
  customWeights: 
    enabled: false
    imageTag: weights-image-tag
  settingsYaml:
    log_level: INFO
    model:
      weights_path: yolov8n.pt
      device: cpu
      nms_agnostic: false
      inference_size: [ 640, 640 ]
      classes: null
    drop_edge_detections: false
    redis:
      stream_ids:
        - stream1

objectTracker:
  image:
    repository: starwitorg/sae-object-tracker
    tag: 4.0.0
  enabled: true
  streamIds:
    - stream1
  settingsYaml:
    log_level: INFO
    tracker_algorithm: OCSORT
    tracker_config:
      det_thresh: 0.2
      max_age: 30
      min_hits: 3
      asso_threshold: 0.3
      delta_t: 3
      asso_func: 'iou'
      inertia: 0.2
      use_byte: false
      Q_xy_scaling: 1
      Q_s_scaling: 1

geoMapper:
  image:
    repository: starwitorg/sae-geo-mapper
    tag: 1.0.0
  enabled: false
  settingsYaml:
    log_level: INFO
    cameras: []

detectionAggregator:
  image:
    repository: starwitorg/detection-aggregator
    tag: 0.2.7
  enabled: false
  settingsYaml:
    log_level: INFO
    chunk:
      buffer_size: 1
      time_in_ms: 20
      geo_coordinate:
        latitude: 0
        longitude: 0

aiControl:
  image:
    repository: starwitorg/sae-ai-control
    tag: 0.1.3
  enabled: false
  settingsYaml:
    log_level: INFO
    time_past: 1d

cleaningStatusFilter:
  image:
    repository: starwitorg/sae-cleaning-status-filter
    tag: 0.4.0
  enabled: false
  detectionWeights: 
    imageTag: weights-image-tag
  settingsYaml:
    log_level: INFO

redisWriter:
  image:
    repository: starwitorg/sae-redis-writer
    tag: 2.1.1
  enabled: false
  instances:
    - name: output1
      settingsYaml:
        log_level: INFO
        target_redis:
          host: host
          port: 6379
          buffer_length: 10
          target_stream_maxlen: 100
          tls: false
        mapping_config:
          - source: geomapper:stream1
            target: geomapper:mysae1

databaseWriter:
  image:
    repository: starwitorg/sae-database-writer
    tag: 2.0.0
  enabled: false
  config:
    redisStreamIds:
      - stream1
    db:
      jdbcUrl: jdbc:postgresql://host:port/
      schema: schema
      username: username
      password: password
      hypertable: tablename

valkey:
  architecture: standalone
  auth:
    enabled: false
  valkeyConfig: |-
    save ""
    appendonly no
  dataStorage:
    enabled: false
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 250m
  metrics:
    enabled: true

prometheus:
  alertmanager:
    enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  prometheus-node-exporter:
    enabled: true
  server:
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
  extraScrapeConfigs: |-
    - job_name: valkey_exporter
      static_configs:
        - targets: ['{{ include "sae.valkeyMetricsServiceName" $ }}:9121']
    - job_name: sae_pods
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            own_namespace: true
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_sae_starwit_de_stage]
          action: keep
          regex: (video-source|object-detector|object-tracker|geo-mapper|redis-writer|cleaning-status-filter)
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_annotation_sae_starwit_de_stage]
          action: replace
          target_label: stage
          

grafana:
  adminPassword: admin
  sidecar:
    dashboards:
      enabled: true
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Viewer
  datasources:
    datasources.yaml: 
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://{{ include "sae.prometheusServiceName" . }}
